version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
  - package-ecosystem: "uv"
    directory: "/"
    schedule:
      interval: "monthly"
  {%- if cookiecutter.include_frontend == 'y' %}
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "monthly"
  {%- endif %}
  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "monthly"
