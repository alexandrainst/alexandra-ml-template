repos:
-   repo: https://github.com/pre-commit/pygrep-hooks
    rev: v{{ cookiecutter._pygrep_hooks_version }}
    hooks:
      - id: python-use-type-annotations
-   repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v{{ cookiecutter._pre_commit_hooks_version }}
    hooks:
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: debug-statements
-   repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v{{ cookiecutter._ruff_version }}
    hooks:
      - id: ruff-check
        args:
          - --fix
          - --unsafe-fixes
          - --exit-non-zero-on-fix
        types_or:
          - python
          - pyi
          - jupyter
      - id: ruff-format
        types_or:
          - python
          - pyi
          - jupyter
-   repo: https://github.com/kynan/nbstripout
    rev: {{ cookiecutter._nbstripout_version }}
    hooks:
    -   id: nbstripout
-   repo: local
    hooks:
    -   id: ty-check
        name: Ty (type checking)
        language: python
        entry: uv run ty check src/{{cookiecutter.project_name}}
        pass_filenames: false
-   repo: https://github.com/DavidAnson/markdownlint-cli2
    rev: v{{ cookiecutter._markdownlint_version }}
    hooks:
    -   id: markdownlint-cli2
        args:
          - --fix
{%- if cookiecutter.include_frontend == 'y' %}
-   repo: local
    hooks:
    -   id: frontend-check
        name: Frontend type check and lint
        language: system
        entry: npm run check
        pass_filenames: false
{%- endif %}
